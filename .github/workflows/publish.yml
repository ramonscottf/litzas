name: Publish Site Content

# Deploys the Litzas site.
#   - Push to main             -> PRODUCTION (litzas.wickowaypoint.com)   [automatic]
#   - Push to any other branch -> PREVIEW    (ali-preview.litzas.pages.dev)
#   - Manual run (workflow_dispatch) -> preview by default, or production
# Renders from the live content store (cms.wickowaypoint.com) before deploy.
#
# WHY THIS EXISTS: merging to main used to do NOTHING until someone fired this
# workflow by hand, so finished edits sat invisible on production for days.
# Now: main = live. Experiments go on a branch (auto-previewed), never on main.

on:
  push:
    branches: ['**']
  workflow_dispatch:
    inputs:
      target:
        description: "deploy target: preview (default) or production"
        required: false
        default: "preview"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Fetch latest content from store
        run: node scripts/fetch-content.mjs
      - name: Render site
        run: node scripts/render-site.mjs
      - name: Deploy to PREVIEW
        if: ${{ (github.event_name == 'push' && github.ref != 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && github.event.inputs.target != 'production') }}
        run: npx --yes wrangler@latest pages deploy . --project-name=litzas --branch=ali-preview --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_PAGES_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: "77f3d6611f5ceab7651744268d434342"
      - name: Deploy to PRODUCTION
        if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'production') }}
        run: npx --yes wrangler@latest pages deploy . --project-name=litzas --branch=main --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_PAGES_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: "77f3d6611f5ceab7651744268d434342"
